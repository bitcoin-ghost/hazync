name: adversarial

# Builds the real prover (Bitcoin Core consensus code -> riscv32 guest) and runs the self-contained
# soundness checks on every push: the block-170 consensus regression and the adversarial suite, which
# asserts that a witness exploiting each known hole (host-controlled height, in-block double-spend /
# ordering, malformed coinbase) is REJECTED, alongside an honest baseline that must be accepted.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  accumulator-tests:
    # Fast, always-green: the pure-Rust Utreexo accumulator (single-delete vs a full-forest oracle).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain
        run: rustup update --no-self-update stable && rustc --version
      - name: Utreexo accumulator tests
        run: cargo test --manifest-path accumulator/Cargo.toml --release

  soundness-suite:
    # Full build (RISC0 toolchain + Core source + patches) then run regress + adversarial.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Provision (RISC0 toolchain, Bitcoin Core v28 source, patches, build)
        env:
          REPO_DIR: ${{ github.workspace }}
          # rzup authenticates its GitHub API calls with this, avoiding the anonymous
          # rate limit that otherwise flakes the toolchain install on shared CI runners.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./provision-vps.sh
      - name: Guest image id (METHOD_ID) — for reproducibility tracking
        run: |
          . "$HOME/.cargo/env"
          export PATH="$HOME/.risc0/bin:$PATH" HAZYNC_BASE="$HOME/hazync-build"
          ./prover/target/release/host method-id
      - name: Block-170 consensus regression
        run: |
          . "$HOME/.cargo/env"
          export PATH="$HOME/.risc0/bin:$PATH" HAZYNC_BASE="$HOME/hazync-build"
          ./prover/target/release/host regress
      - name: Adversarial soundness suite (every hole must REJECT)
        run: |
          . "$HOME/.cargo/env"
          export PATH="$HOME/.risc0/bin:$PATH" HAZYNC_BASE="$HOME/hazync-build"
          ./prover/target/release/host adversarial
      - name: Consensus reject-path negative tests (COV-1 time-too-old, COV-2 merkle CVE-2012-2459)
        run: |
          . "$HOME/.cargo/env"
          export PATH="$HOME/.risc0/bin:$PATH" HAZYNC_BASE="$HOME/hazync-build"
          cd prover && HAZYNC_HOST=./target/release/host ./ci_negative_tests.sh
      - name: BIP30 grandfathered overwrite (real block 91842)
        run: |
          . "$HOME/.cargo/env"
          export PATH="$HOME/.risc0/bin:$PATH" HAZYNC_BASE="$HOME/hazync-build"
          ./prover/target/release/host check-bip30

  reproducible-image-id:
    # Build the guest in the hermetic container (fixed paths) and assert its METHOD_ID equals the
    # published canonical id in reproduce/METHOD_ID. Fails on any drift — the reproducibility guard.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build reproducible container (guest at fixed paths)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: docker build --secret id=gh_token,env=GITHUB_TOKEN -t hazync-repro -f reproduce/Dockerfile .
      - name: Assert built METHOD_ID == canonical (reproduce/METHOD_ID)
        run: |
          BUILT=$(docker run --rm hazync-repro | grep -oE 'METHOD_ID [0-9a-f]{64}' | awk '{print $2}')
          CANON=$(grep -vE '^[[:space:]]*#' reproduce/METHOD_ID | grep -oE '[0-9a-f]{64}' | head -1)
          echo "built     = $BUILT"
          echo "canonical = $CANON"
          if [ -z "$BUILT" ] || [ "$BUILT" != "$CANON" ]; then
            echo "::error::guest METHOD_ID drifted from the canonical id — reproducibility broken"
            exit 1
          fi
          echo "reproducible METHOD_ID matches canonical ✓"

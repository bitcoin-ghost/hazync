# Hazync Proof Party — single-domain wiring.
# Paste this INSIDE the existing `server { ... }` block for bitcoinghost.org in
# /etc/nginx/sites-enabled/bitcoinghost  (same file/pattern as the /api/pool/vmN/ proxies),
# then: sudo nginx -t && sudo systemctl reload nginx
#
# Result: EVERYTHING lives under one domain — no subdomain, no second site.
#   bitcoinghost.org/hazync           → the page (static, served from the web root)
#   bitcoinghost.org/hazync/api/...   → proxied to the coordinator box (state/claim/submit/witness)
# Contributors point their CLI at:  COORD_URL=https://bitcoinghost.org/hazync
# The dashboard fetches:            /hazync/api/state   (window.HAZYNC_STATE_URL or default path)

# --- coordinator API + witnesses (reverse-proxy to the coordinator box) ---
location /hazync/api/ {
    # If the coordinator runs on THIS web box:   http://127.0.0.1:8899/api/
    # If it runs on a separate box:              http://COORD_IP:8899/api/   (firewall :8899 to this host)
    proxy_pass http://127.0.0.1:8899/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;      # the coordinator's rate limiter reads this
    proxy_connect_timeout 5s;
    proxy_read_timeout 130s;                            # host verify-any can take up to ~120s
    # CORS is already open from the coordinator; no need to add headers here.
}


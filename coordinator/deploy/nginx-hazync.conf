# Hazync Proof Party — single-domain wiring.
# EVERYTHING lives under one domain — no subdomain, no second site.
#   bitcoinghost.org/hazync           → the page (static, served from the web root)
#   bitcoinghost.org/hazync/api/...   → proxied to the coordinator box (state/claim/submit/witness)
# Contributors point their CLI at:  COORD_URL=https://bitcoinghost.org/hazync
#
# There are TWO parts. Part A goes in the `http { }` context (top level, e.g. a file in
# /etc/nginx/conf.d/ or the main nginx.conf http block). Part B goes INSIDE the existing
# `server { ... }` block for bitcoinghost.org. Then: sudo nginx -t && sudo systemctl reload nginx

# ============================================================================
# PART A — http { } context (rate/conn zones + micro-cache). Put this at http level, NOT in a server{}.
# ============================================================================
# Per-IP request-rate + connection limits: an anonymous GET flood on /api/state (a full DB scan +
# frontier walk per call) is otherwise the cheapest way to take the public board down.
limit_req_zone  $binary_remote_addr  zone=hazync_api:10m   rate=10r/s;
limit_conn_zone $binary_remote_addr  zone=hazync_conn:10m;
# 1-second micro-cache for the read-only board state — collapses a burst of pollers into one upstream
# hit (the coordinator also caches internally; this is the outer, cheaper layer).
proxy_cache_path /var/cache/nginx/hazync levels=1:2 keys_zone=hazync_cache:10m max_size=64m inactive=10s use_temp_path=off;

# ============================================================================
# PART B — inside server { } for bitcoinghost.org
# ============================================================================

# Read-only board state: micro-cached, rate/conn limited. Exact-match so it wins over the block below.
location = /hazync/api/state {
    proxy_pass http://127.0.0.1:8899/api/state;    # coordinator box IP if it's a separate machine
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr; # the coordinator only trusts XFF from this proxy
    limit_req  zone=hazync_api burst=20 nodelay;
    limit_conn hazync_conn 20;
    proxy_cache hazync_cache;
    proxy_cache_valid 200 1s;
    proxy_cache_lock on;                           # one upstream refill at a time under load
    add_header X-Cache-Status $upstream_cache_status;
}

# coordinator API + witnesses (claim/submit/heartbeat/proof/witness). NOT cached (writes + large blobs).
location /hazync/api/ {
    proxy_pass http://127.0.0.1:8899/api/;         # coordinator box IP if it's a separate machine
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr; # the coordinator's rate limiter reads this
    proxy_connect_timeout 5s;
    proxy_read_timeout 130s;                        # host verify-any can take up to ~120s
    limit_req  zone=hazync_api burst=20 nodelay;
    limit_conn hazync_conn 20;
    client_max_body_size 8m;                        # match the coordinator's MAX_BODY — else folded
                                                    # multi-block receipts (up to ~1.7 MB) 413 at the proxy
    # CORS is already open from the coordinator; no need to add headers here.
}

